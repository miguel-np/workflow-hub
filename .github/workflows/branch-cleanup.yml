name: Branch Cleanup

on:
  workflow_call:

permissions:
  contents: write

jobs:
  cleanup:
    name: Delete merged branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.merged == true
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref
            const { owner, repo } = context.repo

            // Get the repo default branch
            const { data: repoData } = await github.rest.repos.get({ owner, repo })
            const defaultBranch = repoData.default_branch

            // Fetch branch protection status directly
            let isProtected = false
            try {
              await github.rest.repos.getBranchProtection({ owner, repo, branch })
              isProtected = true
            } catch (e) {
              // 404 means no protection rule exists
              isProtected = false
            }

            if (branch === defaultBranch || isProtected) {
              core.info(`Branch '${branch}' is the default branch or is protected — skipping deletion.`)
              return
            }

            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` })
              core.info(`Branch '${branch}' deleted successfully.`)
            } catch (e) {
              core.warning(`Could not delete branch '${branch}': ${e.message}`)
            }

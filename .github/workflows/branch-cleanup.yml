name: Branch Cleanup

on:
  workflow_call:

permissions:
  contents: write

jobs:
  cleanup:
    name: Delete merged branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.merged == true
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref
            const { owner, repo } = context.repo
            if (['main', 'master', 'develop', 'dev'].includes(branch)) {
              core.info(`Rama protegida '${branch}', se omite el borrado`)
              return
            }
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` })
              core.info(`Rama '${branch}' eliminada correctamente`)
            } catch (e) {
              core.warning(`No se pudo eliminar la rama '${branch}': ${e.message}`)
            }

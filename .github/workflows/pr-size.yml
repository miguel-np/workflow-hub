name: PR Size Labels

on:
  workflow_call:

permissions:
  pull-requests: write

jobs:
  size:
    name: Label PR by size
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: size/XS
          xs_max_size: 10
          s_label: size/S
          s_max_size: 50
          m_label: size/M
          m_max_size: 200
          l_label: size/L
          l_max_size: 500
          xl_label: size/XL
          fail_if_xl: false

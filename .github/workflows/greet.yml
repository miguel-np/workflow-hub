name: Greet Contributors

on:
  workflow_call:

permissions:
  issues: write
  pull-requests: write

jobs:
  greet:
    name: Greet first-time contributors
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thank you for filing your first issue! 🎉
            Please make sure you have filled in the template completely so we can assist you as quickly as possible.
          pr-message: |
            Thank you for your first contribution! 🎉
            We will review this pull request as soon as possible.
            Please ensure all CI checks pass and that the PR title follows the [Conventional Commits](https://www.conventionalcommits.org/) format.

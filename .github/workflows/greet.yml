name: Greet Contributors

on:
  workflow_call:

permissions:
  issues: write
  pull-requests: write

jobs:
  greet:
    name: Greet first-time contributors
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            ¡Gracias por abrir tu primer issue! 🎉
            Por favor, asegúrate de rellenar la plantilla correctamente para que podamos ayudarte mejor.
          pr-message: |
            ¡Gracias por tu primera contribución! 🎉
            Revisaremos el PR lo antes posible. Asegúrate de que los checks pasen y de que el título siga el formato de Conventional Commits.

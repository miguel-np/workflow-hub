name: Stale

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  stale:
    name: Close stale issues and PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,security
          stale-issue-message: >
            This issue has been inactive for more than 60 days and will be closed
            automatically in 7 days if there is no further activity.
            If this is still relevant, please leave a comment to keep it open.
          stale-pr-message: >
            This pull request has been inactive for more than 60 days and will be closed
            automatically in 7 days if there is no further activity.
            If you are still working on this, please leave a comment or push a new commit.
          close-issue-message: >
            Closed due to inactivity. Feel free to reopen if this is still relevant.
          close-pr-message: >
            Closed due to inactivity. Feel free to reopen if you would like to continue working on this.

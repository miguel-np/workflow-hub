name: Bug Report
description: Reportar un error o comportamiento inesperado
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Descripción del bug
      description: Descripción clara del error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
      description: Qué debería haber pasado
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Pasos mínimos para reproducir el error
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Entorno
      description: SO, versión, runtime, etc.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Logs, capturas, información extra
    validations:
      required: false
